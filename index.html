<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hồi Ức Tội Lỗi - Visual Novel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-container">
        <!-- Menu Screen -->
        <div id="menu-screen">
            <h1>HỒI ỨC TỘI LỖI</h1>
            <div id="scenario-list"></div>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="hidden">
            <div id="background"></div>
            <div id="character-container"><img id="character" src=""></div>
            <div id="dialogue-box">
                <div id="name-tag"></div>
                <p id="text-content"></p>
                <div id="click-prompt">▼</div>
            </div>
            <button id="back-to-menu">Trở về Menu</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
